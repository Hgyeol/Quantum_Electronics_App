name: stock_app
description: "Quantum Electronics - 개인투자자를 위한 투자 리서치 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP / 인증
  dio: ^5.8.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # WebSocket
  web_socket_channel: ^3.0.2

  # 차트
  candlesticks: ^3.0.1

  # 상태관리
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^15.1.2

  # 로컬 저장소
  shared_preferences: ^2.5.3

  # 유틸
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/stocks/
